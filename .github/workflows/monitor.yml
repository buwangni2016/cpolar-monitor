name: cpolar-monitor

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cookie cache
        uses: actions/cache@v4
        with:
          path: .cpolar_cookie
          key: cpolar-cookie

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: .tunnel_state
          key: cpolar-state

      - name: Write .env
        run: |
          echo "CPOLAR_EMAIL=${{ secrets.CPOLAR_EMAIL }}" > .env
          echo "CPOLAR_PASSWORD=${{ secrets.CPOLAR_PASSWORD }}" >> .env
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: Run check
        run: bash cpolar-monitor.sh run-once

      - name: Save cookie cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cpolar_cookie
          key: cpolar-cookie

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .tunnel_state
          key: cpolar-state
